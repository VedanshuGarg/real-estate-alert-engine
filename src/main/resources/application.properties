spring.application.name=real-estate-alert-engine

datasource.url=jdbc:postgresql://localhost:5432/real_estate_db
datasource.username=${DB_USER:postgres}
datasource.password=${DB_PASSWORD:password}
datasource.driver-class-name=org.postgresql.Driver

jpa.hibernate.ddl-auto=update
jpa.show-sql=false

# Webhook / Notification Credentials
telegram.bot-token=${TELEGRAM_BOT_TOKEN:mock-bot-token}
telegram.chat-id=${TELEGRAM_CHAT_ID:mock-chat-id}

# Background Task Scheduling Configuration
task.scheduling.pool.size=2
task.scheduling.thread-name-prefix=scraper-cron-
